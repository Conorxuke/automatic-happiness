<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trinzo — Back-Office Control Surface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#01163B; --navy-soft:#1b2f55; --turq:#17D0C4; --turq-tint:#e3faf8;
    --slate:#607382; --grey:#E0E3E7; --grey-tint:#f3f5f7;
    --ink:#0c1320; --ink-soft:#3d4654; --ink-faint:#7d8794;
    --green:#198754; --green-tint:#e4f2eb;
    --amber:#9a6b00; --amber-tint:#f6eed8;
    --red:#b3261e; --red-tint:#f7e4e2;
    --navy-tint:#e6eaf1;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#fff;color:var(--ink);font-family:'Roboto',Arial,sans-serif;font-size:14px;line-height:1.5;}

  /* ---------- header ---------- */
  header{display:flex;align-items:center;gap:20px;padding:12px 26px;background:#fff;border-bottom:3px solid var(--navy);
    position:sticky;top:0;z-index:30;}
  header img{height:34px;display:block;}
  .htag{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);font-weight:700;border-left:1px solid var(--grey);padding-left:18px;}
  .spacer{flex:1;}
  .role-note{font-size:11.5px;color:var(--ink-faint);max-width:210px;text-align:right;}
  .role-switch{display:flex;gap:4px;background:var(--grey-tint);border:1px solid var(--grey);border-radius:8px;padding:4px;}
  .role-switch button{border:none;background:transparent;font-family:'Roboto',sans-serif;font-size:12.5px;font-weight:500;
    color:var(--ink-soft);padding:7px 12px;border-radius:6px;cursor:pointer;transition:all .15s;}
  .role-switch button:hover{color:var(--navy);}
  .role-switch button.active{background:var(--navy);color:#fff;font-weight:700;}

  /* ---------- layout ---------- */
  .app{display:flex;min-height:calc(100vh - 62px);}
  nav.sidebar{width:226px;flex-shrink:0;background:var(--navy);padding:22px 10px;}
  nav.sidebar .navhead{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#8fa0bd;font-weight:700;padding:0 12px 10px;}
  nav.sidebar a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;color:#c8d2e2;
    text-decoration:none;font-weight:500;font-size:13.5px;cursor:pointer;margin-bottom:2px;border-left:3px solid transparent;}
  nav.sidebar a:hover{background:var(--navy-soft);color:#fff;}
  nav.sidebar a.active{background:var(--navy-soft);color:#fff;border-left-color:var(--turq);font-weight:700;}
  nav.sidebar a .badge{margin-left:auto;background:var(--turq);color:var(--navy);font-size:10.5px;font-weight:700;
    border-radius:9px;padding:1px 7px;min-width:20px;text-align:center;}
  nav.sidebar .ico{width:16px;text-align:center;opacity:.9;}
  main{flex:1;padding:26px 32px 60px;max-width:1180px;background:#fff;}

  /* ---------- common ---------- */
  .pagehead{margin-bottom:20px;}
  .pagehead h2{font-size:24px;font-weight:700;color:var(--navy);letter-spacing:-.01em;}
  .pagehead p{color:var(--ink-soft);font-size:13.5px;max-width:780px;margin-top:4px;}
  .grid{display:grid;gap:14px;}
  .g2{grid-template-columns:1fr 1fr;}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:980px){.g3,.g4{grid-template-columns:1fr 1fr;}}
  .card{background:#fff;border:1px solid var(--grey);border-radius:8px;padding:16px 18px;}
  .card h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;letter-spacing:.04em;
    padding:2px 9px;border-radius:10px;text-transform:uppercase;white-space:nowrap;}
  .chip.extract{background:var(--navy-tint);color:var(--navy);}
  .chip.draft{background:var(--turq-tint);color:#0b7d76;}
  .chip.audit{background:var(--amber-tint);color:var(--amber);}
  .chip.retrieve{background:var(--grey-tint);color:var(--slate);border:1px solid var(--grey);}
  .chip.green{background:var(--green-tint);color:var(--green);}
  .chip.amber{background:var(--amber-tint);color:var(--amber);}
  .chip.red{background:var(--red-tint);color:var(--red);}
  .chip.neutral{background:var(--grey-tint);color:var(--ink-soft);}
  .chip.line{background:#fff;color:var(--slate);border:1px solid var(--grey);text-transform:none;letter-spacing:0;font-weight:500;}
  .meta{font-size:11.5px;color:var(--ink-faint);}
  .prov{font-size:11px;color:var(--ink-faint);display:flex;gap:12px;flex-wrap:wrap;margin-top:9px;padding-top:8px;border-top:1px dashed var(--grey);}
  .prov span b{color:var(--ink-soft);font-weight:500;}

  /* ---------- queue items ---------- */
  .queue-group{margin-bottom:24px;}
  .queue-group .qhead{display:flex;align-items:baseline;gap:10px;margin-bottom:9px;}
  .queue-group .qhead h3{font-size:15px;font-weight:700;color:var(--navy);}
  .queue-group .qhead .count{font-size:12px;color:var(--ink-faint);}
  .qitem{background:#fff;border:1px solid var(--grey);border-radius:8px;padding:14px 16px;margin-bottom:10px;
    transition:opacity .4s, transform .4s;}
  .qitem.flagged{border-left:4px solid var(--red);}
  .qitem.leaving{opacity:0;transform:translateX(24px);}
  .qtop{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;}
  .qtitle{font-weight:700;font-size:14px;flex:1;color:var(--ink);min-width:260px;}
  .qbody{color:var(--ink-soft);font-size:13px;margin-top:5px;max-width:840px;}
  .qbody .caveat{display:block;margin-top:6px;color:var(--amber);font-weight:700;font-size:12.5px;}
  .route{margin-top:9px;background:var(--turq-tint);border:1px solid #bfeeea;border-radius:6px;padding:8px 12px;font-size:12.5px;color:var(--ink-soft);}
  .route b{color:var(--navy);}
  .qactions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap;align-items:center;}
  .btn{font-family:'Roboto',sans-serif;font-size:12.5px;font-weight:700;border-radius:6px;padding:7px 15px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
  .btn.approve{background:var(--navy);color:#fff;}
  .btn.approve:hover{background:var(--navy-soft);}
  .btn.assign{background:var(--turq);color:var(--navy);}
  .btn.assign:hover{background:#12b5ab;}
  .btn.ghost{background:#fff;border-color:var(--grey);color:var(--ink-soft);}
  .btn.ghost:hover{border-color:var(--slate);color:var(--ink);}
  .btn.danger{background:#fff;border-color:var(--red);color:var(--red);}
  .btn.danger:hover{background:var(--red-tint);}
  .btn:disabled{opacity:.45;cursor:default;}
  select.assign-sel{font-family:'Roboto',sans-serif;font-size:12.5px;border:1px solid var(--grey);border-radius:6px;padding:7px 9px;color:var(--ink-soft);background:#fff;cursor:pointer;}
  .editbox{display:none;margin-top:10px;}
  .editbox.open{display:block;}
  .editbox textarea, .wb textarea{width:100%;min-height:80px;border:1px solid var(--grey);border-radius:6px;background:#fff;
    font-family:'Roboto',sans-serif;font-size:13px;padding:10px;color:var(--ink);resize:vertical;}
  .editbox .row{display:flex;gap:8px;margin-top:8px;}
  .empty{border:1.5px dashed var(--grey);border-radius:8px;padding:26px;text-align:center;color:var(--ink-faint);font-size:13px;}

  /* ---------- filters ---------- */
  .filterbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
  .filterbar button{font-family:'Roboto',sans-serif;font-size:12px;font-weight:500;border:1px solid var(--grey);background:#fff;
    color:var(--ink-soft);border-radius:14px;padding:5px 13px;cursor:pointer;}
  .filterbar button.active{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:700;}

  /* ---------- stats ---------- */
  .stat{background:#fff;border:1px solid var(--grey);border-radius:8px;padding:14px 16px;border-top:3px solid var(--navy);}
  .stat.t{border-top-color:var(--turq);}
  .stat .label{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);font-weight:700;}
  .stat .value{font-size:28px;font-weight:700;color:var(--navy);margin-top:3px;line-height:1.1;}
  .stat .sub{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
  .stat .fresh{font-size:10.5px;color:var(--ink-faint);margin-top:6px;border-top:1px dashed var(--grey);padding-top:5px;}

  /* ---------- tables ---------- */
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--navy);font-weight:700;text-align:left;padding:8px 10px;}
  td{padding:8px 10px;border-bottom:1px solid var(--grey);vertical-align:top;color:var(--ink-soft);}
  tr:nth-child(even) td{background:var(--grey-tint);}
  td:first-child{color:var(--ink);font-weight:500;}

  /* ---------- triggers ---------- */
  .trig{display:flex;align-items:flex-start;gap:14px;background:#fff;border:1px solid var(--grey);border-radius:8px;padding:15px 17px;margin-bottom:10px;}
  .trig .dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0;}
  .dot.live{background:var(--green);box-shadow:0 0 0 3px var(--green-tint);}
  .dot.sched{background:var(--amber);box-shadow:0 0 0 3px var(--amber-tint);}
  .dot.manual{background:var(--slate);box-shadow:0 0 0 3px var(--grey-tint);}
  .dot.flight{background:var(--turq);box-shadow:0 0 0 3px var(--turq-tint);animation:pulse 1s ease infinite;}
  @keyframes pulse{50%{opacity:.4;}}
  .trig .body{flex:1;}
  .trig .name{font-weight:700;font-size:14px;color:var(--navy);}
  .trig .cond{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .trig .last{font-size:11.5px;color:var(--ink-faint);margin-top:5px;}

  /* ---------- bars ---------- */
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .bar-row .bl{width:150px;font-size:12px;font-weight:500;color:var(--ink-soft);flex-shrink:0;}
  .bar-row .track{flex:1;height:13px;background:var(--grey-tint);border-radius:3px;overflow:hidden;}
  .bar-row .fill{height:100%;border-radius:3px;}
  .bar-row .bv{width:90px;font-size:11.5px;color:var(--ink-faint);text-align:right;flex-shrink:0;}

  /* ---------- workbench ---------- */
  .wb{margin-bottom:16px;}
  .wb .wbhead{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .wb .wbhead h3{font-size:16px;font-weight:700;color:var(--navy);}
  .wb input[type=text], .wb select{font-family:'Roboto',sans-serif;font-size:13px;border:1px solid var(--grey);border-radius:6px;padding:9px 11px;color:var(--ink);width:100%;background:#fff;}
  .wb .row{display:flex;gap:10px;margin-top:10px;align-items:center;flex-wrap:wrap;}
  .answer{margin-top:12px;background:var(--grey-tint);border:1px solid var(--grey);border-radius:6px;padding:14px 16px;font-size:13px;color:var(--ink-soft);display:none;}
  .answer.show{display:block;}
  .answer .cite{display:inline-block;background:#fff;border:1px solid var(--grey);border-radius:4px;font-size:11px;padding:1px 7px;color:var(--navy);font-weight:500;margin:2px 3px 0 0;}

  .ragproj{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px dashed var(--grey);}
  .ragproj:last-child{border-bottom:none;}
  .ragproj .pname{font-weight:700;width:120px;flex-shrink:0;color:var(--ink);}
  .ragproj .pdetail{flex:1;font-size:12.5px;color:var(--ink-soft);}

  /* ---------- process chains ---------- */
  .chain{background:#fff;border:1px solid var(--grey);border-radius:8px;padding:16px 18px;margin-bottom:14px;}
  .chain .chead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .chain .chead h3{font-size:15px;font-weight:700;color:var(--navy);}
  .chain .chead .inst{font-size:12.5px;color:var(--ink-soft);}
  .steps{display:flex;flex-wrap:wrap;gap:6px;}
  .step{flex:1;min-width:128px;max-width:230px;border:1px solid var(--grey);border-radius:6px;padding:8px 10px;background:var(--grey-tint);}
  .step.done{background:var(--green-tint);border-color:#b7d8c4;}
  .step.active{background:var(--turq-tint);border-color:var(--turq);}
  .step.blocked{background:var(--red-tint);border-color:var(--red);}
  .step .smark{float:right;font-size:11px;font-weight:700;color:var(--ink-faint);}
  .step.done .smark{color:var(--green);}
  .step.active .smark{color:#0b7d76;}
  .step.blocked .smark{color:var(--red);}
  .step .sname{font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.3;}
  .step .sown{font-size:10.5px;color:var(--ink-faint);margin-top:3px;}
  .step .snote{font-size:10.5px;color:var(--ink-soft);margin-top:3px;font-style:italic;}
  .gatebar{margin-top:11px;font-size:11.5px;color:var(--ink-soft);background:var(--grey-tint);border-left:3px solid var(--navy);padding:7px 11px;border-radius:0 4px 4px 0;}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;
    padding:11px 22px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:50;box-shadow:0 12px 30px -10px rgba(1,22,59,.5);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .footer-note{margin-top:36px;font-size:11px;color:var(--ink-faint);border-top:1px solid var(--grey);padding-top:12px;}
  .checkrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--grey);}
  .checkrow:last-child{border-bottom:none;}
  .checkrow .tick{width:7px;height:7px;border-radius:50%;background:var(--turq);flex-shrink:0;}
</style>
</head>

/* ---------------- helpers ---------------- */

function visibleItems(role){
  const pend = ITEMS.filter(i=>i.status!=="done");
  return role==="coordinator" ? pend : pend.filter(i=>i.approver===role);
}
function qCount(role){ return visibleItems(role).length; }
function blockedCount(){ return CHAINS.reduce((a,c)=>a+c.steps.filter(s=>s.s==="blocked").length,0); }
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2800);
}
function engineChip(e){ return `<span class="chip ${e.split(" ")[0].toLowerCase()}">${e}</span>`; }
function provLine(i){
  const trail = (i.trail||[]).join("  ›  ");
  return `<div class="prov"><span>engine: <b>${i.engine}</b></span><span>model: <b>${i.model}</b></span>
    <span>tokens: <b>${i.tokens}</b></span><span>generated: <b>${i.ts}</b></span>
    <span>trail: <b>${trail}</b></span></div>`;
}

/* ---------------- actions ---------------- */

function resolveItem(id, verdict, label){
  const item = ITEMS.find(i=>i.id===id); if(!item) return;
  const el = document.getElementById("qi-"+id);
  if(el) el.classList.add("leaving");
  setTimeout(()=>{
    item.status="done";
    state.cleared++; state.minutesSaved += item.mins||10;
    if(verdict==="rejected"){
      CORRECTIONS.unshift({ date:"Today", agent:item.engine+" engine", type:"Rejected in queue", by:PEOPLE[state.role].name,
        detail:`'${item.title}' rejected; logged to Agent_Corrections for the monthly prompt review.` });
    }
    render();
    toast(label || (verdict==="approved" ? "Approved: written to the system of record" : "Rejected: logged to the Correction_Log"));
  },380);
}

function assignItem(id, to, viaSuggestion){
  const item = ITEMS.find(i=>i.id===id); if(!item || !to) return;
  const fromP = PEOPLE[item.approver], toP = PEOPLE[to];
  const reason = viaSuggestion && item.next ? item.next.reason : "manual reassignment";
  item.trail = item.trail||[];
  item.trail.push(`${fromP.name} → ${toP.name}`);
  HANDOFFS.unshift({ date:"Today", item:item.title, from:fromP.name, to:toP.name, reason, outcome:"in queue" });
  item.approver = to;
  if(viaSuggestion) item.next = null;
  /* EI special: verify hands to PI with a sign-off action */
  if(item.ei && to==="exec"){ item.actions = ["PI sign-off (technical accuracy)"]; item.body += " Verified for completeness by Liam."; }
  const el=document.getElementById("qi-"+id);
  if(el) el.classList.add("leaving");
  setTimeout(()=>{ render(); toast(`Assigned to ${toP.name} (${toP.fn}); handoff logged`); },380);
}

function toggleEdit(id){ document.getElementById("eb-"+id).classList.toggle("open"); }
function saveEdit(id){
  const item=ITEMS.find(i=>i.id===id);
  item.body=document.getElementById("ta-"+id).value; item.edited=true;
  CORRECTIONS.unshift({ date:"Today", agent:item.engine+" engine", type:"Edited before approval", by:PEOPLE[state.role].name,
    detail:`'${item.title}' edited in queue; diff captured in Agent_Corrections.` });

function customAction(id, label){

  resolveItem(id,"approved",label+": actioned and logged");
}

function passToSales(idx){
  const proj = PROJECTS[idx]; if(!proj || proj.passed) return;
  proj.passed = true;
  PIPELINE.unshift({ opp:`${proj.p.split(" ·")[0]}: ${proj.opp.slice(0,40)}…`, line:proj.line, stage:"Lead",
    value:"TBC", next:"LUCE brief generating", src:`Delivery referral (${PEOPLE[state.role].name}, just now)` });
  ITEMS.push({ id:"ld"+Date.now(), approver:"sales", line:proj.line, engine:"Extract", model:"Haiku", tokens:"0.8k",
    ts:"Just now", mins:30, group:"Pre-sales triage (LUCE)",
    title:`New lead from Delivery: ${proj.p}`,
    body:`Spotted on the ground: ${proj.opp}. Project context, CSAT (${proj.csat}) and the relevant capability sheet attached. LUCE brief queued.`,
    trail:[`${PEOPLE[state.role].name} (Delivery) → Conor`] });
  HANDOFFS.unshift({ date:"Today", item:`Lead: ${proj.p}`, from:PEOPLE[state.role].name, to:"Conor", reason:"opportunity spotted inside a current client", outcome:"in pipeline as Lead" });
  render(); toast("Lead passed to Sales: pipeline updated, handoff logged");
}

/* ---------------- rendering ---------------- */

function setRole(r){
  state.role=r;
  const allowed=NAV.filter(n=>n.roles.includes(r)).map(n=>n.id);
  if(!allowed.includes(state.page)) state.page = r==="exec" ? "kpis" : "today";
  render();
}
function setPage(p){ state.page=p; render(); }
function setLine(l){ state.lineFilter=l; render(); }

function render(){
  document.getElementById("roleSwitch").innerHTML = Object.entries(PEOPLE).map(([k,v])=>
    `<button class="${state.role===k?'active':''}" onclick="setRole('${k}')" title="${v.fn}">${v.name}</button>`).join("");
  const p=PEOPLE[state.role];
  document.getElementById("roleNote").textContent = `${p.fn}: ${p.note}`;

  document.getElementById("sidebar").innerHTML =
    `<div class="navhead">Control surface</div>` +
    NAV.filter(n=>n.roles.includes(state.role)).map(n=>{
      const b=n.badge?n.badge(state.role):0;
      return `<a class="${state.page===n.id?'active':''}" onclick="setPage('${n.id}')">
        <span class="ico">${n.ico}</span>${n.label}${b?`<span class="badge">${b}</span>`:""}</a>`;
    }).join("");

  document.getElementById("view").innerHTML =
    ({today:vToday,approvals:vApprovals,chains:vChains,workbench:vWorkbench,kpis:vKPIs,
      triggers:vTriggers,provenance:vProv,engines:vEngines})[state.page]();
}

/* ----- process chains view ----- */
const SMARK = { done:"✓", active:"●", blocked:"⚠", pending:"○" };
function vChains(){
  return `
  <div class="pagehead"><h2>Process chains</h2>
  <p>Multi-step processes from the mapped SOPs, shown as live chains: each step has an owner, a status and, where the SOP defines one, an SLA. Agents do the steps they can; humans clear the gates. A blocked step alerts its owner and the Coordinator. Step owners can include IT, TA or a client without needing a dashboard seat.</p></div>
  ${CHAINS.map(c=>{
    const done=c.steps.filter(s=>s.s==="done").length;
    const blocked=c.steps.some(s=>s.s==="blocked");
    return `<div class="chain">
      <div class="chead">
        <h3>${c.name}</h3>
        <span class="chip line">${c.line}</span>
        <span class="chip neutral">${c.src}</span>
        ${blocked?'<span class="chip red">blocked</span>':''}
        <span class="inst" style="margin-left:auto">${c.instance} · ${done}/${c.steps.length} steps done</span>
      </div>
      <div class="steps">
        ${c.steps.map(s=>`<div class="step ${s.s}">
          <span class="smark">${SMARK[s.s]}</span>
          <div class="sname">${s.n}</div>
          <div class="sown">${s.o}</div>
          ${s.note?`<div class="snote">${s.note}</div>`:""}
        </div>`).join("")}
      </div>
      <div class="gatebar">${c.gate}</div>
    </div>`;
  }).join("")}
  <div class="footer-note">Chains are configurations, not code: trigger + steps + owners + gates. The sales chain instantiates per opportunity, the onboarding chain per signed SOW, the close chain per month, the content chain per programme.</div>`;
}

/* ----- queue card ----- */
function assignControls(i){
  const opts = Object.entries(PEOPLE).filter(([k])=>k!==i.approver)
    .map(([k,v])=>`<option value="${k}">${v.name} (${v.fn})</option>`).join("");
  const suggested = i.next ? `<button class="btn assign" onclick="assignItem('${i.id}','${i.next.to}',true)">
      Assign → ${PEOPLE[i.next.to].name} (${PEOPLE[i.next.to].fn})</button>` : "";
  return suggested + `<select class="assign-sel" onchange="assignItem('${i.id}',this.value,false)">
    <option value="">Assign to…</option>${opts}</select>`;
}

function qcard(i){
  const custom=(i.actions||[]).map((a,n)=>
    `<button class="btn ${n===0?'approve':'ghost'}" onclick="customAction('${i.id}','${a}')">${a}</button>`).join("");
  const std=`<button class="btn approve" onclick="resolveItem('${i.id}','approved')">Approve</button>`;
  return `<div class="qitem ${i.flagged?'flagged':''}" id="qi-${i.id}">
    <div class="qtop">
      <div class="qtitle">${i.title} ${i.edited?'<span class="chip neutral">edited</span>':''} ${i.flagged?'<span class="chip red">flag</span>':''}</div>
      <span class="chip line">${i.line}</span>${engineChip(i.engine)}
    </div>
    <div class="qbody">${i.body||""}${i.caveat?`<span class="caveat">⚠ ${i.caveat}</span>`:""}</div>
    ${i.next?`<div class="route"><b>Suggested next:</b> ${PEOPLE[i.next.to].name} (${PEOPLE[i.next.to].fn}), ${i.next.reason}.</div>`:""}
    <div class="qactions">
      ${i.actions?custom:std}
      ${assignControls(i)}
      <button class="btn ghost" onclick="toggleEdit('${i.id}')">Edit</button>
      <button class="btn danger" onclick="resolveItem('${i.id}','rejected')">Reject</button>
      <span class="meta" style="margin-left:auto">with ${PEOPLE[i.approver].name}</span>
    </div>
    <div class="editbox" id="eb-${i.id}">
      <textarea id="ta-${i.id}">${(i.body||"").replace(/<[^>]*>/g,"")}</textarea>
      <div class="row"><button class="btn approve" onclick="saveEdit('${i.id}')">Save edit (logged)</button>
      <button class="btn ghost" onclick="toggleEdit('${i.id}')">Cancel</button></div>
    </div>
    ${provLine(i)}
  </div>`;
}

function vTriggers(){
  return `
  <div class="pagehead"><h2>Workflows & triggers</h2>
  <p>Each workflow has an unambiguous start condition; vague triggers make temperamental agents. Fire a configuration manually, or watch what is in flight. A new back-office need is a new topping on an existing engine, configured here, not coded.</p></div>
  ${TRIGGERS.map(t=>`
    <div class="trig">
      <span class="dot ${t.inFlight?'flight':t.mode==='live'?'live':t.mode==='sched'?'sched':'manual'}"></span>
      <div class="body">
        <div class="name">${t.agent} ${t.inFlight?'<span class="chip amber">in flight…</span>':''}</div>
        <div class="cond">${t.cond}</div>
        <div class="last">${t.last}</div>
      </div>
      ${t.canRun?`<button class="btn approve" ${t.inFlight?'disabled':''} onclick="fireTrigger('${t.id}')">${t.inFlight?'Running…':(t.runLabel||'Run now')}</button>`:`<span class="chip neutral">event-driven</span>`}
    </div>`).join("")}
  <div class="footer-note">Trigger definitions are locked per the readiness document; changes go through engine configuration.</div>`;
}
